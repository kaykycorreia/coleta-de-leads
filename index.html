<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Cadastro</title>

<style>

body{
font-family:Arial;
background:#0b6efd;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}

.container{
background:white;
padding:40px;
border-radius:10px;
width:350px;
box-shadow:0 10px 30px rgba(0,0,0,0.2);
}

input{
width:100%;
padding:12px;
margin-bottom:15px;
border:1px solid #ccc;
border-radius:6px;
}

button{
width:100%;
padding:14px;
background:#0b6efd;
color:white;
border:none;
border-radius:6px;
font-size:16px;
}

</style>

</head>

<body>

<div class="container">

<h2>Cadastro para participar</h2>

<form action="https://script.google.com/macros/s/AKfycbzXJtn-K4dtPU7kYx9A0sbtrGgZ9zPZASmGNFnjJq74kM0UajVAXnZJGWdxz-8nQGUQ/exec" method="POST">

<input name="nome" placeholder="Nome completo" required>

<input name="cpf" placeholder="CPF" required>

<input name="email" placeholder="Email" required>

<input name="whatsapp" placeholder="WhatsApp" required>

<input name="nascimento" type="date" required>

<button type="submit">Enviar</button>

</form>

</div>

</body>
</html>
