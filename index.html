<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Cadastro - Leilão de Veículos</title>

<style>

body{
font-family: Arial, sans-serif;
background: linear-gradient(135deg,#0b6efd,#003a8c);
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}

.container{
background:white;
padding:40px;
border-radius:10px;
width:350px;
box-shadow:0 10px 30px rgba(0,0,0,0.3);
}

h2{
text-align:center;
margin-bottom:25px;
}

input{
width:100%;
padding:12px;
margin-bottom:15px;
border:1px solid #ccc;
border-radius:6px;
font-size:14px;
}

button{
width:100%;
padding:14px;
background:#0b6efd;
color:white;
border:none;
border-radius:6px;
font-size:16px;
cursor:pointer;
}

button:hover{
background:#084ec2;
}

#msg{
text-align:center;
margin-top:15px;
font-weight:bold;
color:green;
}

</style>

</head>

<body>

<div class="container">

<h2>Preencha as informações para entrarmos em contato:</h2>

<input id="nome" placeholder="Nome completo">

<input id="cpf" placeholder="CPF">

<input id="email" placeholder="Email">

<input id="whatsapp" placeholder="WhatsApp">

<label>Data de nascimento</label>
<input id="nascimento" type="date">

<button onclick="enviar()">Enviar Cadastro</button>

<p id="msg"></p>

</div>

<script>

function enviar(){

const dados = {
nome: document.getElementById("nome").value,
cpf: document.getElementById("cpf").value,
email: document.getElementById("email").value,
whatsapp: document.getElementById("whatsapp").value,
nascimento: document.getElementById("nascimento").value
}

fetch("https://script.google.com/macros/s/AKfycbzvCKqUl6tN5RsCJ_G4EvjVfrlpJSwBw0K0a0IZPPQbHWCtPcTf3w0YDRss7NpSZb8H/exec",{
method:"POST",
mode:"no-cors",
body:JSON.stringify(dados)
})

document.getElementById("msg").innerHTML="Cadastro enviado com sucesso!"

}

</script>

</body>

</html>
