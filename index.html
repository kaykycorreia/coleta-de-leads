<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Cadastro - Leilão de Veículos</title>

<style>

body{
font-family: Arial, sans-serif;
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:url("https://images.unsplash.com/photo-1503376780353-7e6692767b70") center/cover no-repeat;
}

body::before{
content:"";
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.45);
backdrop-filter: blur(6px);
z-index:0;
}

.container{
position:relative;
z-index:1;
background:white;
padding:40px;
border-radius:12px;
width:360px;
box-shadow:0 10px 30px rgba(0,0,0,0.3);
}

h2{
text-align:center;
margin-bottom:25px;
}

label{
font-size:14px;
font-weight:bold;
}

input{
width:100%;
padding:12px;
margin-top:5px;
margin-bottom:15px;
border:1px solid #ccc;
border-radius:6px;
}

button{
width:100%;
padding:14px;
background:#0b6efd;
color:white;
border:none;
border-radius:6px;
font-size:16px;
cursor:pointer;
}

button:hover{
background:#084ec2;
}

#msg{
text-align:center;
margin-top:15px;
font-weight:bold;
color:green;
}

.contador{
position:fixed;
top:20px;
left:20px;
background:rgba(0,0,0,0.7);
color:white;
padding:10px 16px;
border-radius:8px;
font-size:14px;
z-index:2;
}

.notificacao{
position:fixed;
bottom:20px;
left:20px;
background:white;
padding:14px 18px;
border-radius:8px;
box-shadow:0 5px 20px rgba(0,0,0,0.3);
font-size:14px;
z-index:999;
opacity:0;
transform:translateY(20px);
transition:all 0.4s;
}

.notificacao.show{
opacity:1;
transform:translateY(0);
}

</style>

</head>

<body>

<div class="contador">
👥 Interessados: <span id="contador">128</span>
</div>

<div class="container">

<h2>Preencha as informações para entrarmos em contato</h2>

<label>Nome completo</label>
<input id="nome" placeholder="Digite seu nome">

<label>CPF</label>
<input id="cpf" placeholder="000.000.000-00">

<label>Email</label>
<input id="email" placeholder="seuemail@email.com">

<label>WhatsApp</label>
<input id="whatsapp" placeholder="(11) 99999-9999">

<label>Data de nascimento</label>
<input id="nascimento" type="date">

<button onclick="enviar()">Enviar Cadastro</button>

<p id="msg"></p>

</div>

<script>

let contador = 128

function enviar(){

var nome = document.getElementById("nome").value
var cpf = document.getElementById("cpf").value
var email = document.getElementById("email").value
var whatsapp = document.getElementById("whatsapp").value
var nascimento = document.getElementById("nascimento").value

if(nome=="" || cpf=="" || email=="" || whatsapp=="" || nascimento==""){
document.getElementById("msg").innerHTML="Preencha todos os campos"
return
}

const dados = {
nome:nome,
cpf:cpf,
email:email,
whatsapp:whatsapp,
nascimento:nascimento
}

fetch("https://script.google.com/macros/s/AKfycbzvCKqUl6tN5RsCJ_G4EvjVfrlpJSwBw0K0a0IZPPQbHWCtPcTf3w0YDRss7NpSZb8H/exec",{
method:"POST",
mode:"no-cors",
body:JSON.stringify(dados)
})

contador++
document.getElementById("contador").innerText = contador

document.getElementById("msg").innerHTML="Cadastro enviado com sucesso!"

}

function mascaraCPF(cpf){
cpf = cpf.replace(/\D/g,"")
cpf = cpf.replace(/(\d{3})(\d)/,"$1.$2")
cpf = cpf.replace(/(\d{3})(\d)/,"$1.$2")
cpf = cpf.replace(/(\d{3})(\d{1,2})$/,"$1-$2")
return cpf
}

function mascaraWhatsApp(tel){
tel = tel.replace(/\D/g,"")
tel = tel.replace(/^(\d{2})(\d)/g,"($1) $2")
tel = tel.replace(/(\d{5})(\d{4})$/,"$1-$2")
return tel
}

document.getElementById("cpf").addEventListener("input",function(){
this.value = mascaraCPF(this.value)
})

document.getElementById("whatsapp").addEventListener("input",function(){
this.value = mascaraWhatsApp(this.value)
})

/* POPUP FALSO */

const nomes = [
"Marciele Santos Almeida",
"Anderson Cardoso",
"Juliana Ribeiro",
"Carlos Eduardo Martins",
"Patricia Fernandes",
"Lucas Henrique Souza",
"Fernanda Oliveira",
"Bruno Carvalho",
"Amanda Rodrigues",
"Rafael Almeida"
]

let notificacoes = 0

function mostrarNotificacao(){

if(notificacoes >= 6) return

const nome = nomes[Math.floor(Math.random()*nomes.length)]

const div = document.createElement("div")
div.className="notificacao"
div.innerHTML="✅ <b>"+nome+"</b> acabou de se cadastrar"

document.body.appendChild(div)

setTimeout(()=>{div.classList.add("show")},100)

setTimeout(()=>{
div.classList.remove("show")
setTimeout(()=>{div.remove()},500)
},4000)

notificacoes++

}

let intervalo = setInterval(mostrarNotificacao,5000)

document.addEventListener("visibilitychange",function(){
if(document.hidden){
clearInterval(intervalo)
}
})

</script>

</body>

</html>
