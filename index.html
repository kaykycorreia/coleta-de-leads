<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Cadastro para participar</title>

<style>

body{
margin:0;
font-family:Arial, Helvetica, sans-serif;
background:linear-gradient(135deg,#0b6efd,#5aa2ff);
height:100vh;
display:flex;
justify-content:center;
align-items:center;
}

.container{
background:white;
padding:40px;
border-radius:12px;
width:350px;
box-shadow:0 10px 30px rgba(0,0,0,0.2);
text-align:center;
}

h2{
margin-bottom:25px;
}

input{
width:100%;
padding:12px;
margin-bottom:15px;
border:1px solid #ddd;
border-radius:6px;
font-size:14px;
}

input:focus{
outline:none;
border-color:#0b6efd;
}

button{
width:100%;
padding:14px;
background:#0b6efd;
color:white;
border:none;
border-radius:6px;
font-size:16px;
cursor:pointer;
font-weight:bold;
}

button:hover{
background:#094bb5;
}

#msg{
margin-top:15px;
font-weight:bold;
color:green;
}

</style>

</head>

<body>

<div class="container">

<h2>Cadastro para participar</h2>

<input id="nome" placeholder="Nome completo">

<input id="cpf" placeholder="CPF">

<input id="email" placeholder="Email">

<input id="whatsapp" placeholder="WhatsApp">

<input id="nascimento" type="date">

<button onclick="enviar()">Enviar</button>

<p id="msg"></p>

</div>

<script>

function enviar(){

const dados = {
nome: document.getElementById("nome").value,
cpf: document.getElementById("cpf").value,
email: document.getElementById("email").value,
whatsapp: document.getElementById("whatsapp").value,
nascimento: document.getElementById("nascimento").value
}

fetch("https://script.google.com/macros/s/AKfycbzXJtn-K4dtPU7kYx9A0sbtrGgZ9zPZASmGNFnjJq74kM0UajVAXnZJGWdxz-8nQGUQ/exec",{
method:"POST",
mode:"no-cors",
body:JSON.stringify(dados)
})

document.getElementById("msg").innerHTML="Cadastro enviado com sucesso!"

}

</script>

</body>
</html>
