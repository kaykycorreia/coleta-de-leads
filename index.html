<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Cadastro - Leilão de Veículos</title>

<style>

body{
font-family: Arial, sans-serif;
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:url("https://images.unsplash.com/photo-1503376780353-7e6692767b70") center/cover no-repeat;
}

/* camada escura + desfoque */

body::before{
content:"";
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
backdrop-filter: blur(6px);
background:rgba(0,0,0,0.4);
z-index:0;
}

/* contador */

.contador{
position:fixed;
top:20px;
left:20px;
background:rgba(0,0,0,0.7);
color:white;
padding:12px 18px;
border-radius:8px;
font-size:14px;
z-index:2;
box-shadow:0 5px 15px rgba(0,0,0,0.4);
}

/* formulário */

.container{
position:relative;
z-index:1;
background:rgba(255,255,255,0.9);
padding:40px;
border-radius:12px;
width:360px;
box-shadow:0 10px 30px rgba(0,0,0,0.3);
}

h2{
text-align:center;
margin-bottom:25px;
}

label{
font-size:14px;
font-weight:bold;
}

input{
width:100%;
padding:12px;
margin-top:5px;
margin-bottom:15px;
border:1px solid #ccc;
border-radius:6px;
font-size:14px;
}

button{
width:100%;
padding:14px;
background:#0b6efd;
color:white;
border:none;
border-radius:6px;
font-size:16px;
cursor:pointer;
}

button:hover{
background:#084ec2;
}

#msg{
text-align:center;
margin-top:15px;
font-weight:bold;
color:green;
}

</style>

</head>

<body>

<div class="contador">
👥 Interessados: <span id="contador">128</span>
</div>

<div class="container">

<h2>Preencha as informações para entrarmos em contato</h2>

<label>Nome completo</label>
<input id="nome" placeholder="Digite seu nome">

<label>CPF</label>
<input id="cpf" placeholder="000.000.000-00" maxlength="14">

<label>Email</label>
<input id="email" placeholder="seuemail@email.com">

<label>WhatsApp</label>
<input id="whatsapp" placeholder="(11) 99999-9999" maxlength="15">

<label>Data de nascimento</label>
<input id="nascimento" type="date">

<button onclick="enviar()">Enviar Cadastro</button>

<p id="msg"></p>

</div>

<script>

let contador = 128

function enviar(){

var nome = document.getElementById("nome").value
var cpf = document.getElementById("cpf").value
var email = document.getElementById("email").value
var whatsapp = document.getElementById("whatsapp").value
var nascimento = document.getElementById("nascimento").value

if(nome=="" || cpf=="" || email=="" || whatsapp=="" || nascimento==""){
document.getElementById("msg").innerHTML="Preencha todos os campos"
return
}

const dados = {
nome:nome,
cpf:cpf,
email:email,
whatsapp:whatsapp,
nascimento:nascimento
}

fetch("https://script.google.com/macros/s/AKfycbzvCKqUl6tN5RsCJ_G4EvjVfrlpJSwBw0K0a0IZPPQbHWCtPcTf3w0YDRss7NpSZb8H/exec",{
method:"POST",
mode:"no-cors",
body:JSON.stringify(dados)
})

contador++
document.getElementById("contador").innerText = contador

document.getElementById("msg").innerHTML="Cadastro enviado com sucesso!"

}

function mascaraCPF(cpf){

cpf = cpf.replace(/\D/g,"")
cpf = cpf.replace(/(\d{3})(\d)/,"$1.$2")
cpf = cpf.replace(/(\d{3})(\d)/,"$1.$2")
cpf = cpf.replace(/(\d{3})(\d{1,2})$/,"$1-$2")

return cpf

}

function mascaraWhatsApp(telefone){

telefone = telefone.replace(/\D/g,"")
telefone = telefone.replace(/^(\d{2})(\d)/g,"($1) $2")
telefone = telefone.replace(/(\d{5})(\d{4})$/,"$1-$2")

return telefone

}

document.getElementById("cpf").addEventListener("input",function(){
this.value = mascaraCPF(this.value)
})

document.getElementById("whatsapp").addEventListener("input",function(){
this.value = mascaraWhatsApp(this.value)
})

</script>

</body>

</html>
